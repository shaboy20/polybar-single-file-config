;==========================================================
;   SINGLE FILE POLYBAR CONFIGURATION FOR BSPWM
;==========================================================

[colors]
background = #1e1e2e
background-alt = #313244
foreground = #cdd6f4
primary = #cba6f7
secondary = #89b4fa
alert = #f38ba8
disabled = #6c7086

[bar/main]
width = 100%
height = 28pt
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

padding-left = 1
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

; Ensure you have a Nerd Font installed (e.g., JetBrainsMono Nerd Font)
font-0 = "JetBrainsMono Nerd Font:size=10;2"

; Modules layout for BSPWM
modules-left = bspwm
modules-center = xwindow
modules-right = pulseaudio memory cpu date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; WM Settings
wm-restack = bspwm

[module/bspwm]
type = internal/bspwm

; Only show workspaces defined on the same output as the bar
pin-workspaces = true

; Inline settings for focus/occupied states
inline-mode = false
enable-click = true
enable-scroll = false
reverse-scroll = false
fuzzy-match = true

; Clean the format structure to rely purely on labels
format = <label-state> <label-mode>

; --- Focused Workspace (Filled Circle in Catppuccin Blue) ---
label-focused =   
label-focused-foreground = ${colors.secondary}
label-focused-padding = 2

; --- Occupied Workspace (Hollow Circle - Active Apps) ---
label-occupied =   
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 2

; --- Urgent Workspace (Filled Circle in Alert Pink) ---
label-urgent =   
label-urgent-foreground = ${colors.alert}
label-urgent-padding = 2

; --- Empty Workspace (Hollow Circle - Muted Gray) ---
label-empty =   
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage%%

[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S
label = %date%
label-foreground = ${colors.secondary}

[settings]
screenchange-reload = true
pseudo-transparency = true
